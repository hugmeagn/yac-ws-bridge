workflows:
  build-ios:
    name: Build iOS (.ipa) for AltStore
    # Среда сборки: мощный Mac Pro
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      # Нам нужна 10-я версия .NET
      dotnet: '10.0.x' 
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'release/*'
          include: true
    scripts:
      # Шаг 1: Установка MAUI workload
      # Так как .NET 10 будет предустановлен, просто доставляем maui
      - name: Install MAUI workload
        script: dotnet workload install maui
      # Шаг 2: Сборка проекта
      - name: Build .ipa
        script: |
          cd client
          dotnet publish -f net10.0-ios -c Release \
            -p:BuildIpa=true \
            -p:RuntimeIdentifier=ios-arm64
    artifacts:
      # Собранный .ipa появится здесь
      - client/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
