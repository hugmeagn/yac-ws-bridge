workflows:
  maui-net10-altstore:
    name: MAUI .NET 10 for AltStore
    instance_type: mac_mini_m2 # Рекомендуется для .NET 10 и Xcode 26+
    scripts:
      - name: Install .NET 10 SDK
        script: |
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version 10.0.7 # Указываем конкретную версию
          # Добавляем dotnet в PATH
          echo "export PATH=$PATH:$HOME/.dotnet" >> $CM_ENV
          echo "export DOTNET_ROOT=$HOME/.dotnet" >> $CM_ENV
      - name: Install MAUI Workload
        script: |
          dotnet workload install maui --source https://api.nuget.org/v3/index.json
      - name: Build Unsigned App
        script: |
          # Используем net10.0-ios
          dotnet build -f net10.0-ios -c Release -p:RuntimeIdentifier=ios-arm64 \
          -p:CodesignKey="" -p:CodesignProvision="" -p:CodeSigningAllowed=false
      - name: Package for AltStore
        script: |
          mkdir Payload
          cp -r bin/Release/net10.0-ios/ios-arm64/*.app Payload/
          zip -r MauiApp_Net10.ipa Payload
    artifacts:
      - "*.ipa"
