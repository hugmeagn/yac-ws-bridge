workflows:
  maui-net10-ios:
    name: Bridge to Freedom iOS (AltStore)
    instance_type: mac_mini_m2
    environment:
      vars:
        DOTNET_PATH: $CM_BUILD_DIR/dotnet
        DOTNET: $CM_BUILD_DIR/dotnet/dotnet
    scripts:
      - name: Install .NET 10 SDK
        script: |
          wget https://dot.net
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 10.0 --install-dir $DOTNET_PATH

      - name: Install MAUI Workload
        script: |
          $DOTNET nuget locals all --clear
          $DOTNET workload install ios maui --source https://nuget.org

      - name: Build Unsigned App
        script: |
          # Собираем проект из папки maui-client
          $DOTNET build maui-client \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodeSigningAllowed=false

      - name: Package for AltStore
        script: |
          mkdir -p Payload
          # Копируем .app из выходной папки maui-client
          cp -r maui-client/bin/Release/net10.0-ios/ios-arm64/*.app Payload/
          # Создаем финальный .ipa
          zip -r BridgeToFreedom_Net10.ipa Payload
          
    artifacts:
      - "*.ipa"
