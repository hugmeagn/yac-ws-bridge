workflows:
  build-ios-unsigned:
    name: Build Unsigned iOS (.ipa) for AltStore
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      dotnet: '10.0.x' 
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'release/*'
          include: true
    scripts:
      - name: Install MAUI workload
        script: dotnet workload install maui
      - name: Build unsigned .ipa
        script: |
          cd client
          dotnet publish -f net10.0-ios -c Release \
            -p:BuildIpa=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="" -p:CodesignProvision=""  # Отключаем подпись
    artifacts:
      - client/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
