workflows:
  build-ios-unsigned:
    name: Build Unsigned iOS (.ipa) for AltStore
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'release/*'
          include: true
    scripts:
      - name: Install .NET 10 SDK
        script: |
          # Скачиваем и устанавливаем .NET 10 SDK
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0
          # Правильно экспортируем PATH через переменные окружения Codemagic
          echo "PATH=$HOME/.dotnet:$PATH" >> $CM_ENV
          # Загружаем новый PATH в текущий скрипт для проверки
          export PATH="$HOME/.dotnet:$PATH"
          dotnet --version
      - name: Install MAUI workload
        script: |
          dotnet workload install maui
      - name: Build unsigned .ipa
        script: |
          cd client
          dotnet publish -f net10.0-ios -c Release \
            -p:BuildIpa=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="" -p:CodesignProvision=""
    artifacts:
      - client/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
