workflows:
  maui-net10-ios:
    name: MAUI .NET 10 iOS (AltStore)
    instance_type: mac_mini_m2
    environment:
      vars:
        # Указываем пути согласно официальному гайду
        DOTNET_PATH: $CM_BUILD_DIR/dotnet
        DOTNET: $CM_BUILD_DIR/dotnet/dotnet
    scripts:
      - name: Install .NET 10 SDK
        script: |
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          # Устанавливаем именно 10-ю версию в указанную папку
          ./dotnet-install.sh --channel 10.0 --install-dir $DOTNET_PATH

      - name: Install MAUI Workload
        script: |
          $DOTNET nuget locals all --clear
          # Устанавливаем рабочую нагрузку для iOS и MAUI
          $DOTNET workload install ios maui --source https://api.nuget.org/v3/index.json

      - name: Build Unsigned App
        script: |
          # Собираем проект, используя переменную $DOTNET
          $DOTNET build -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodeSigningAllowed=false

      - name: Package for AltStore
        script: |
          mkdir -p Payload
          # Копируем скомпилированный .app (используем wildcard)
          cp -r bin/Release/net10.0-ios/ios-arm64/*.app Payload/
          # Создаем .ipa для установки через AltStore
          zip -r MauiApp_Net10.ipa Payload
          
    artifacts:
      - "*.ipa"
