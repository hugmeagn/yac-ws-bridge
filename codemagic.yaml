workflows:
  maui-net10-ios:
    name: Bridge to Freedom iOS (AltStore)
    instance_type: mac_mini_m2
    environment:
      vars:
        DOTNET_PATH: $CM_BUILD_DIR/dotnet
        DOTNET: $CM_BUILD_DIR/dotnet/dotnet
    scripts:
      - name: Install .NET 10 SDK
        script: |
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 10.0 --install-dir $DOTNET_PATH

      - name: Install MAUI Workload
        script: |
          $DOTNET nuget locals all --clear
          $DOTNET workload install ios maui

      - name: Build Unsigned App
        script: |
          $DOTNET build maui-client -f net10.0-ios -r ios-arm64

      - name: Package for AltStore
        script: |
          ls -R
          mkdir -p Payload
          cp -r maui-client/bin/Release/net10.0-ios/ios-arm64/*.app Payload/
          zip -r BridgeToFreedom_Net10.ipa Payload
          
    artifacts:
      - "*.ipa"
